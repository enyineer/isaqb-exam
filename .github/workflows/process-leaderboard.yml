name: Process Leaderboard Submission

on:
  issues:
    types: [opened]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'leaderboard-submission')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Process submission
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCUSSION_ID: ${{ vars.LEADERBOARD_DISCUSSION_ID }}
        run: bun run scripts/scoreSubmission.ts ${{ github.event.issue.number }}
