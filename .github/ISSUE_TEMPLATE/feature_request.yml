name: "✨ Feature Request"
description: "Suggest a new feature or improvement for the iSAQB exam application."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Thank you for suggesting an improvement. Please describe the feature and its motivation clearly so we can evaluate and prioritize it.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: "Describe the problem or limitation this feature would address. What pain point or unmet need does this solve?"
      placeholder: "As a user, I find it frustrating when ..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: "Describe your ideal solution. How should the feature work from a user's perspective?"
      placeholder: "The application should ..."
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: "Have you considered any alternative solutions or workarounds? If so, describe them and explain why they are insufficient."
      placeholder: "An alternative would be to ..., but this doesn't work well because ..."
    validations:
      required: false

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: "Which area of the application does this feature relate to?"
      multiple: true
      options:
        - Exam UI
        - Question Bank / Content
        - Results / Scoring
        - Export / Sharing
        - Accessibility
        - Performance
        - Mobile Experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Perceived Priority
      description: "How important is this feature to you?"
      multiple: false
      options:
        - Nice to have
        - Important
        - Critical — blocks my use case
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: "If you have any mockups, sketches, or examples from other applications, share them here."
      placeholder: "Drag and drop images here, paste URLs, or describe the desired UI."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: "Any other information, references, or context that might help us understand and implement this feature."
    validations:
      required: false
