name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior in the iSAQB exam application."
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thank you for taking the time to report a bug. Please fill out the sections below as completely as possible so we can reproduce and fix the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "A clear and concise description of the bug."
      placeholder: "Describe what went wrong in 1–3 sentences."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: "Provide a step-by-step sequence to reliably trigger the bug."
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: "Describe what you expected to happen."
      placeholder: "The application should have ..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: "Describe what actually happened instead."
      placeholder: "Instead, the application ..."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: "If applicable, add screenshots or screen recordings to help explain the problem."
      placeholder: "Drag and drop images here or paste URLs."
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: "Which browser(s) does this bug occur in?"
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      description: "What type of device were you using?"
      multiple: false
      options:
        - Desktop
        - Tablet
        - Mobile
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "Your operating system and version."
      placeholder: "e.g. macOS 15.3, Windows 11, iOS 18"
    validations:
      required: false

  - type: textarea
    id: console-errors
    attributes:
      label: Console Errors
      description: "If there are any errors in the browser developer console, paste them here."
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: "Any other information that might be relevant (e.g. exam mode, specific question set, network conditions)."
    validations:
      required: false
